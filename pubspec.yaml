name: hisuesl
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Icons ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_svg: ^2.2.3
  percent_indicator: ^4.2.5
  flip_card: ^0.7.0  

  # --- Firebase & Backend ---
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # --- State Management & Utils ---
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  flutter_tts: ^3.8.3
  http: ^1.2.0

  flutter_gemini: ^3.0.0
  flutter_markdown: ^0.6.23
  flutter_dotenv: ^5.1.0
  # --- XỬ LÝ ẢNH (MỚI) ---
  image_picker: ^1.0.7       # Chọn ảnh từ thư viện
  flutter_image_compress: ^2.1.0 # Nén ảnh để lưu Base64 nhẹ
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.1

  mailer: ^6.1.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/sounds/
    - .env